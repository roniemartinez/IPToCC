name: Publish to PyPI

on:
  push:
    tags:
      - 'python-v*'
      - 'all-v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.platform.os }} ${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        platform:
          - { os: linux, runner: ubuntu-latest, target: x86_64 }
          - { os: linux, runner: ubuntu-24.04-arm, target: aarch64 }
          - { os: macos, runner: macos-latest, target: x86_64 }
          - { os: macos, runner: macos-latest, target: aarch64 }
          - { os: windows, runner: windows-latest, target: x64 }
    steps:
      - uses: actions/checkout@v4.3.1
        with:
          persist-credentials: false
      - name: Build wheel
        uses: PyO3/maturin-action@v1.50.1
        with:
          working-directory: bindings/python
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: "true"
          manylinux: auto
      - uses: actions/upload-artifact@v7.0.0
        with:
          name: wheels-${{ matrix.platform.os }}-${{ matrix.platform.target }}
          path: bindings/python/dist

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4.3.1
        with:
          persist-credentials: false
      - name: Build sdist
        uses: PyO3/maturin-action@v1.50.1
        with:
          working-directory: bindings/python
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v7.0.0
        with:
          name: wheels-sdist
          path: bindings/python/dist

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          packages-dir: dist/
          skip-existing: true

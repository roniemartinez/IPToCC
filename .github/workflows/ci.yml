name: CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.3.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2.9.1

      - run: cargo fmt --all -- --check

      - name: Clippy (native)
        run: cargo clippy --workspace --all-targets --exclude iptocc-wasm -- -D warnings

      - name: Clippy (wasm)
        run: cargo clippy --target wasm32-unknown-unknown -p iptocc-wasm --lib -- -D warnings

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2.75.17
        with:
          tool: cargo-deny

      - run: cargo deny check

  test-rust:
    name: Test Rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4.3.1
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2.9.1
      - run: cargo test -p iptocc

  test-python:
    name: Test Python ${{ matrix.python-version }} (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4.3.1
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2.9.1
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v3.2.4
      - name: Build and test
        working-directory: bindings/python
        run: |
          uv run --python ${{ matrix.python-version }} --with "maturin==1.13.1" maturin develop --release
          uv run --python ${{ matrix.python-version }} --with pytest pytest tests/test_api.py -q

  test-wasm:
    name: Test WASM (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4.3.1
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2.9.1
      - uses: taiki-e/install-action@v2.75.17
        with:
          tool: wasm-pack
      - uses: actions/setup-node@v6.3.0
        with:
          node-version: "22"
      - name: Build and test
        shell: bash
        run: |
          cd bindings/wasm && wasm-pack build --target nodejs --out-dir pkg-nodejs
          cd ../..
          node --test bindings/wasm/tests/api.test.js
